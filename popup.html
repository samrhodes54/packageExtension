<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
</head>

<body>
    <!-- NAV -->
    <button id="goSettings">⚙</button>
    <button id="goMain" style="display:none;">← Back</button>

    <!-- MAIN (calculator) -->
    <div id="mainView">
        <h2>Box Finder</h2>

        <div class="dimensionRow">
            <input id="length" placeholder="L">
            <span>x</span>
            <input id="width" placeholder="W">
            <span>x</span>
            <input id="height" placeholder="H">
        </div>

        <button id="find">Find Box</button>
        <p id="size"></p>
    </div>

    <!-- SETTINGS -->
    <div id="settingsView" style="display:none;">
        <div class="section">
            <h2>Add Box</h2>
            <div class="dimensionRow">
                <input id="newL" placeholder="L">
                <span>x</span>
                <input id="newW" placeholder="W">
                <span>x</span>
                <input id="newH" placeholder="H">
            </div>
            <button id="addBox">Add Box</button>
        </div>

        <div class="section">
            <h3>Saved Boxes</h3>
            <div id="boxList"></div>
        </div>

        <div class="section">
            <h2>Settings</h2>
            <div class="settingRow">
                <span>Padding</span>
                <input id="padding" placeholder="in" value="0.5">
            </div>
        </div>
    </div>

    <script src="boxes.js" defer></script>
    <script src="popup.js" defer></script>
</body>

</html>
